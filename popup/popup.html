<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadline OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 200px;
      max-height: 580px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e8e8e8;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 8px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      background: #0f0f0f;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    .header-sub { font-size: 11px; color: #666; margin-top: 1px; }
    .header-actions { display: flex; gap: 6px; align-items: center; }
    .refresh-btn, .scan-btn {
      background: none; border: none; cursor: pointer;
      color: #555; font-size: 12px; padding: 4px 8px;
      border-radius: 4px; transition: all 0.2s;
    }
    .refresh-btn:hover, .scan-btn:hover { color: #aaa; background: #1a1a1a; }
    .scan-btn {
      background: #1a2530;
      color: #60a5fa;
      font-weight: 500;
      font-size: 11px;
    }
    .scan-btn:hover { background: #1e3a5f; }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Scan status bar ── */
    .scan-status {
      padding: 6px 16px;
      font-size: 11px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid #1a1a1a;
    }
    .scan-spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #333;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .scan-new {
      color: #4ade80;
      font-weight: 500;
      margin-left: auto;
    }

    /* ── Auth banner ── */
    #authBanner {
      display: none;
      background: #1a1a00;
      border-bottom: 1px solid #333300;
      padding: 10px 16px;
      font-size: 12px;
      color: #aaa;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    #connectCalBtn {
      background: #1e3a1e;
      color: #4ade80;
      border: none;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    #connectCalBtn:hover { opacity: 0.8; }
    #connectCalBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading / Empty ── */
    .state-msg {
      padding: 40px 16px;
      text-align: center;
      color: #555;
      font-size: 13px;
      line-height: 1.6;
    }
    .state-msg .emoji { font-size: 28px; margin-bottom: 8px; }

    /* ── Section headers ── */
    .section { margin: 0; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #555;
      border-top: 1px solid #1a1a1a;
    }
    .section-header .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-overdue  { background: #e5534b; }
    .dot-today    { background: #e8a030; }
    .dot-week     { background: #3b82f6; }
    .dot-later    { background: #555; }
    .dot-nodate   { background: #444; }
    .dot-confirm  { background: #fbbf24; }

    .section-count {
      margin-left: auto;
      background: #1e1e1e;
      color: #666;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
    }

    /* ── Deadline cards ── */
    .card {
      margin: 4px 12px;
      padding: 10px 12px;
      background: #181818;
      border: 1px solid #242424;
      border-radius: 8px;
      cursor: default;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #333; }
    .card:last-child { margin-bottom: 10px; }
    .card.card-confirm {
      border-left: 3px solid #fbbf24;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .card-subject {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      line-height: 1.3;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-dismiss {
      background: none;
      border: none;
      cursor: pointer;
      color: #444;
      font-size: 14px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .card-dismiss:hover { color: #e5534b; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 2px;
    }

    /* ── Category badges ── */
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }
    .badge-INTERVIEW   { background: #1a2e4a; color: #60a5fa; }
    .badge-ASSIGNMENT  { background: #2a1f3d; color: #a78bfa; }
    .badge-PAYMENT     { background: #2d1f1a; color: #f97316; }
    .badge-APPLICATION { background: #1a2e24; color: #34d399; }
    .badge-EVENT       { background: #2a2512; color: #fbbf24; }
    .badge-REMINDER    { background: #2a2a2a; color: #9ca3af; }
    .badge-UNKNOWN     { background: #1e1e1e; color: #6b7280; }

    .card-date { font-size: 11px; color: #666; }
    .card-date.overdue { color: #e5534b; font-weight: 600; }
    .card-date.soon    { color: #e8a030; }

    .card-sender {
      font-size: 11px;
      color: #444;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
    }

    .card-account {
      font-size: 10px;
      color: #444;
      background: #1a1a1a;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .card-cal-status {
      font-size: 10px;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .card-days {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      flex-shrink: 0;
    }
    .card-days.overdue { color: #e5534b; }
    .card-days.today { color: #e8a030; }
    .card-days.week { color: #3b82f6; }
    .card-days.later { color: #555; }

    /* ── Card action buttons ── */
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-open    { background: #1e3a5f; color: #60a5fa; }
    .btn-done    { background: #1a2e1a; color: #4ade80; }
    .btn-confirm { background: #2d2010; color: #fbbf24; }
    .btn-reject  { background: #2d1a1a; color: #e5534b; }
    .btn-snooze  { background: #2a2520; color: #e8a030; }
    .btn-cal     { background: #1e1e2e; color: #818cf8; }
    .btn-cal-done {
      background: #1a2e1a;
      color: #4ade80;
      text-decoration: none;
      display: inline-block;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 5px;
      font-weight: 500;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-cal-done:hover { opacity: 0.8; }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #444;
      font-size: 11px;
      position: sticky;
      bottom: 0;
      background: #0f0f0f;
    }
    .footer-stats {
      display: flex;
      gap: 10px;
    }
    .footer-stat {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .footer-stat .num {
      color: #888;
      font-weight: 600;
    }
    .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #333;
      font-size: 11px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: #e5534b; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div>
        <h1>⏰ Deadline OS</h1>
        <div class="header-sub" id="authStatus">Gmail deadline tracker</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="scan-btn" id="scanBtn" title="Scan Gmail inbox now">🔍 Scan</button>
      <button class="refresh-btn" id="refreshBtn" title="Refresh">↻</button>
    </div>
  </div>

  <!-- Scan status bar -->
  <div class="scan-status" id="scanStatus">
    <span id="scanStatusText">Checking scan status...</span>
    <span class="scan-new" id="scanNewCount" style="display:none"></span>
  </div>

  <!-- Calendar connect banner (hidden until auth check completes) -->
  <div id="authBanner">
    <span>📅 Connect Google Calendar to auto-create events</span>
    <button id="connectCalBtn">Connect</button>
  </div>

  <!-- Main content area -->
  <div id="content">
    <div class="state-msg">
      <div class="emoji">⏳</div>
      Loading deadlines...
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-stats">
      <div class="footer-stat"><span class="num" id="statTotal">0</span> tracked</div>
      <div class="footer-stat"><span class="num" id="statCompleted">0</span> done</div>
      <div class="footer-stat"><span class="num" id="statUpcoming">0</span> upcoming</div>
    </div>
    <button class="clear-btn" id="clearBtn">Clear all</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
